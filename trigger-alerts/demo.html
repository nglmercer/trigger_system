<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigger Alerts Studio | Anime.js Power</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      font-family: 'Inter', system-ui, sans-serif; 
      background: var(--bg); 
      color: var(--text);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    .background-glow {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: 
        radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15), transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.15), transparent 40%);
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      height: 100vh;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
      z-index: 100;
      box-shadow: 20px 0 50px rgba(0,0,0,0.3);
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 24px;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo span {
      background: var(--primary);
      color: white;
      -webkit-text-fill-color: white;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 14px;
    }

    .demo-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 8px;
    }

    .demo-item {
      padding: 14px 18px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .demo-item:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(5px);
      border-color: var(--primary);
    }

    .demo-item.active {
      background: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
    }

    .demo-item h3 {
      font-size: 14px;
      font-weight: 600;
    }

    .demo-item p {
      font-size: 12px;
      color: var(--text-dim);
    }

    .demo-item.active p {
      color: rgba(255,255,255,0.8);
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      position: relative;
    }

    .info-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid var(--glass-border);
      max-width: 600px;
      text-align: center;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .info-card h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      margin-bottom: 16px;
    }

    .info-card p {
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn-trigger {
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
      transition: all 0.3s;
    }

    .btn-trigger:hover {
      transform: scale(1.05);
      box-shadow: 0 25px 50px rgba(99, 102, 241, 0.5);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* For light DOM alerts */
    trigger-alert {
      z-index: 1000;
    }
  </style>
  <script type="module" src="./demo.ts"></script>
</head>
<body>
  <div class="background-glow"></div>
  
  <aside class="sidebar">
    <div class="logo">Trigger <span>ALERTS</span></div>
    
    <div class="demo-list" id="demoList">
      <!-- Demos will be inserted here -->
    </div>
  </aside>

  <main class="main">
    <div class="info-card">
      <h1 id="activeTitle">Interactive Studio</h1>
      <p id="activeDesc">Select a demo from the sidebar to test different alert configurations and Anime.js animations.</p>
      <button class="btn-trigger" id="triggerBtn">Execute Demo</button>
    </div>
  </main>
</body>
</html>
