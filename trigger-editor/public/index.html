<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trigger Rule Editor - Node-Based</title>
  <link rel="stylesheet" href="./src/styles.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background: #f1f5f9;
      padding: 20px;
    }
    
    .container {
      width: 100%;
      height: calc(100vh - 40px);
      max-width: 1400px;
      margin: 0 auto;
    }
    
    .editor-wrapper {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }
    
    node-editor {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="editor-wrapper">
      <!-- Using the new node-based editor -->
      <node-editor id="editor"></node-editor>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
